
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تسجيل البيانات الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --accent-color: #fbbf24;
            --glass-bg: rgba(255, 255, 255, 0.98);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .main-card {
            background: var(--glass-bg); padding: 3rem; border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%; max-width: 550px; text-align: center; border: 1px solid rgba(251, 191, 36, 0.2);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .header-section h1 { color: #1e293b; font-weight: 800; font-size: 2.2rem; margin: 0; }
        .divider { height: 4px; width: 70px; background: var(--accent-color); margin: 1.2rem auto; border-radius: 2px; }
        .form-group { margin-bottom: 1.8rem; text-align: right; }
        label { display: block; margin-bottom: 0.7rem; font-weight: 700; color: #334155; }
        input, select {
            width: 100%; padding: 1.1rem; border: 2px solid #e2e8f0; border-radius: 1rem;
            font-size: 1rem; font-family: inherit; box-sizing: border-box; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }
        .btn-submit {
            width: 100%; padding: 1.2rem; background: #1e293b; color: var(--accent-color);
            border: none; border-radius: 1rem; font-size: 1.2rem; font-weight: 800; cursor: pointer;
            transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 12px;
        }
        .btn-submit:hover { background: #0f172a; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .hidden { display: none; }
        .already-submitted { background: #fef2f2; color: #991b1b; padding: 2rem; border-radius: 1.5rem; border: 2px dashed #fecaca; font-weight: 800; font-size: 1.3rem; }
        .success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; padding: 2rem; border-radius: 1.5rem; }
        .spinner { border: 3px solid rgba(251, 191, 36, 0.3); border-top: 3px solid var(--accent-color); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="main-card">
    <div id="formContainer">
        <div class="header-section">
            <h1>بوابة تسجيل البيانات</h1>
            <div class="divider"></div>
            <p style="color: #64748b;">يرجى تعبئة الحقول التالية بدقة</p>
        </div>
        <form id="proForm">
            <div class="form-group"><label>الاسم الثلاثي الكامل</label><input type="text" name="fullName" required></div>
            <div class="form-group"><label>هل تملك رقم عسكري؟</label>
                <select name="hasMilitaryId" id="milSelect" onchange="toggleMil()">
                    <option value="لا يوجد">لا يوجد</option><option value="نعم">نعم</option>
                </select>
            </div>
            <div id="milGroup" class="form-group hidden"><label>الرقم العسكري</label><input type="text" name="militaryId" id="milInput"></div>
            <div class="form-group"><label>المسمى الوظيفي</label><input type="text" name="jobTitle" required></div>
            <button type="submit" id="subBtn" class="btn-submit">
                <span id="btnText">إرسال البيانات الرسمية</span>
                <div id="loader" class="spinner hidden"></div>
            </button>
        </form>
    </div>
</div>
<script>
    // ضع رابط السكربت الخاص بك هنا
    const scriptURL = 'ضع_رابط_السكربت_الجديد_هنا';

    if (localStorage.getItem('form_done')) {
        document.getElementById('formContainer').innerHTML = '<div class="already-submitted">⚠️ عذراً، لقد قمت بالتسجيل مسبقاً بنجاح.</div>';
    }

    function toggleMil() {
        const s = document.getElementById('milSelect');
        const g = document.getElementById('milGroup');
        const i = document.getElementById('milInput');
        if (s.value === 'نعم') { g.classList.remove('hidden'); i.required = true; }
        else { g.classList.add('hidden'); i.required = false; }
    }

    const form = document.getElementById('proForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('subBtn').disabled = true;
        document.getElementById('btnText').innerText = 'جاري المعالجة...';
        document.getElementById('loader').classList.remove('hidden');

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                localStorage.setItem('form_done', 'true');
                document.getElementById('formContainer').innerHTML = '<div class="success"><h2>✅ تم الإرسال بنجاح!</h2><p>تم حفظ بياناتك في السجلات الرسمية.</p></div>';
            })
            .catch(err => {
                alert('حدث خطأ، يرجى المحاولة مرة أخرى.');
                document.getElementById('subBtn').disabled = false;
                document.getElementById('btnText').innerText = 'إرسال البيانات الرسمية';
                document.getElementById('loader').classList.add('hidden');
            });
    });
</script>
</body>
</html>
